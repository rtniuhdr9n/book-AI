spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bookai
    username: myuser
    password: 123456
    driver-class-name: org.postgresql.Driver

  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    timeout: 5000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml

# LLM配置（智谱AI）
llm:
  api-key: ${LLM_API_KEY:} # 从环境变量读取，或在此处直接配置
  base-url: https://open.bigmodel.cn/api/paas/v4
  model: glm-4-flash
